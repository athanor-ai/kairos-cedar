# One image, every toolchain. Pull `ghcr.io/athanor-ai/kairos-cedar:latest`
# once; Lean (both toolchains), Rust + Verus, Go, Dafny, Z3, Cedar CLI —
# everything is on PATH. Zero host setup on the user's side.
#
# `./scripts/dc <cmd...>` is the thin wrapper around `docker compose run`.
#
# Assumes you have run:
#   git submodule update --init --recursive
# from the repo root so cedar-spec/, palamedes-lean/, cedar-go/, and
# cedar-integration-tests/ are populated.
services:
  kairos-cedar:
    image: ghcr.io/athanor-ai/kairos-cedar:latest
    build:
      context: ..
      dockerfile: containers/Containerfile
    volumes:
      - ..:/work
    working_dir: /work
    command: ["/bin/bash"]
