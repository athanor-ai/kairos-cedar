# tests/generator_manifest.toml: expected support size and declared
# evaluation count for each generator in this repo. Authority for
# tests/test_support_size_matches_claim.py.
#
# Why this file exists: a driver run once reported N=10000 over the V1
# generator while the V1 generator's true unique-tuple support was 675;
# the MeasureDiff.lean driver cycles ``i % support_size`` so the "10000
# tuples" was actually "675 tuples x 14.8 cycles". Nothing was checking
# that ``support_size >= claimed_N_evaluations`` (or that the harness
# instead reported "N evaluations over a support of S"). Bug A
# regression class.
#
# Test contract:
#   * For each [[generator]] entry, the test computes the true unique-
#     tuple support either by Lean enumeration (small) or by closed-form
#     upper bound (combinatorics from the generator's `Gen.pick` /
#     `genAny` chain).
#   * If `claim_kind = "support_eq"`: assert support_size == expected_support.
#   * If `claim_kind = "support_at_least"`: assert support_size >= expected_support.
#   * If `claimed_N_evaluations > expected_support`: require
#     `claimed_n_exceeds_support = true` so the cycling is disclosed.
#
# Update protocol: when widening a generator (e.g. shipping V2 with a
# larger support), update the expected_support number in the same commit
# as the generator change. The test failure forces both moves atomic.

[[generator]]
id = "cedar_full_v1_policygen"
path = "cedar-full/CedarFull/PolicyGen.lean"
# Closed-form support: 3 principals * 3 actions * 3 resources = 27
# request triples, multiplied by 25 policy shapes (genPolicy chain in
# PolicyGen.lean lines 405-433). Shape 25 uses genWellTyped which
# samples one well-typed expression per draw, so the realised support
# is bounded above by 25, not by the genWellTyped output size; we
# count it as 1 shape for the unique-tuple count.
expected_support = 675   # 27 * 25
claim_kind = "support_eq"

# Declared evaluation count for the V1 phase-C run. Bug A pre-fix:
# claimed_N_evaluations = 10000 with claim_kind = "support_eq" would
# FAIL because 675 != 10000. Post-fix, the harness must either (a)
# report "10000 evaluations over a support of 675 unique tuples" or
# (b) widen the generator to >= 10000.
claimed_N_evaluations = 10000
claimed_n_exceeds_support = true

[[generator]]
id = "cedar_micro_genwelltyped_bool"
path = "cedar-micro/CedarMicro/GenLLM.lean"
# CedarMicro.genWellTyped is a List-monad generator. Under the canonical
# environment Gamma = [int, bool, int] with target tau = bool (.anyBool),
# the generator's realised list length when sampled with default fuel is
# bounded above by the genWellTyped recursion depth. We pin the
# expected support range as a lower bound rather than an exact match
# because the upstream generator is List-backed and may grow with fuel.
expected_support = 100
claim_kind = "support_at_least"
claimed_N_evaluations = 10000
claimed_n_exceeds_support = true

[[generator]]
id = "cedar_micro_genwelltyped_int"
path = "cedar-micro/CedarMicro/GenLLM.lean"
expected_support = 100
claim_kind = "support_at_least"
claimed_N_evaluations = 10000
claimed_n_exceeds_support = true

[[generator]]
id = "cedar_full_widened_shapes"
path = "experiments/phase_c_diff/bug-hunt-2026-04-25/widened_shapes.py"
# Type-directed widening shapes: 11 shapes yielding 206 unique tuples.
# The aggregate 'N=206' in the corresponding SUMMARY.md exactly matches
# the realised support, so this is the gold example of a passing claim.
expected_support = 206
claim_kind = "support_eq"
claimed_N_evaluations = 206
claimed_n_exceeds_support = false
