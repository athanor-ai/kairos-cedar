name = "cedarFull"
defaultTargets = ["CedarFull"]

# Full-Cedar port of the CedarMicro pattern. Targets the real
# Cedar.Spec.Expr (12 constructors across 5 arity classes): flat,
# unary-recursive, binary-recursive, ternary-recursive, and n-ary-
# recursive. Imports cedar-spec directly via the bridge, so it
# pins Lean 4.29.1 (cedar-spec's pin). Palamedes's full
# generator_search scaffolding pins Lean 4.24.0 and is kept in
# cedar-micro; porting it forward to 4.29.1 is Phase C and tracked
# separately as a future-work item (toolchain + Mathlib
# prerequisites). cedar-full uses the Soundness.lean pattern from
# cedar-micro directly: a hand-authored fuel-bounded generator
# plus a machine-checked soundness theorem against the bridge
# predicates.

[[require]]
name = "CedarBridge"
path = "../cedar-spec-bridge"

[[lean_lib]]
name = "CedarFull"

[[lean_exe]]
name = "measure-diff"
root = "MeasureDiff"

[[lean_exe]]
name = "measure-lean"
root = "MeasureLean"
