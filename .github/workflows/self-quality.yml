name: self-quality

# Regression gates for three bug classes found in the diff-testing harness:
#   Bug A: generator support-size vs declared evaluation count
#   Bug B: toolchain version-pin drift (Containerfile vs version_pin.toml)
#   Bug C: cedar CLI rc=2-on-Deny semantics + shared-parser drift fence
#
# See tests/README.md for the per-test rationale.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  regression-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # We do NOT recursively fetch submodules: the cedar-go pin
          # test deliberately reads the pin via `git ls-tree HEAD
          # cedar-go` (the gitlink commit) rather than entering the
          # submodule, so the test stays cheap on CI and still fires on
          # a pin change.
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install minimal deps
        # tomllib is stdlib in 3.11+; tomli kept for the 3.10 fallback.
        run: |
          python -m pip install --upgrade pip
          python -m pip install tomli

      - name: Bug A gate (generator support-size matches manifest)
        run: |
          python3 -m unittest -v tests.test_support_size_matches_claim

      - name: Bug B gate (toolchain pin matches container)
        run: |
          python3 -m unittest -v tests.test_toolchain_pin_consistency

      - name: Bug C gate (cedar CLI rc semantics)
        # The fixture-based mappings run on any host. The live cedar CLI
        # tests skip when cedar is not on PATH; the container-build job
        # below runs them with the real binary.
        run: |
          python3 -m unittest -v tests.test_cedar_cli_rc_semantics

  regression-gates-with-cedar-cli:
    # Optional second job that installs the cedar CLI and runs the live
    # cedar tests. Uses cargo install (the same path Containerfile uses)
    # so the rc semantics are checked against a real binary at the
    # version pinned in tests/version_pin.toml. Failing here fires the
    # same bug-C gate but with end-to-end coverage.
    runs-on: ubuntu-latest
    needs: regression-gates
    continue-on-error: true   # cedar install can fail on transient
                              # network / crates.io issues; the offline
                              # gates above are the strict signal. This
                              # job is the belt-and-suspenders cross-check.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: install cedar-policy-cli at pinned version
        run: |
          # Read the pinned version from version_pin.toml without
          # requiring tomli on the host (sed-out the literal value).
          # If the file shape changes the version-pin test catches it.
          version="$(grep -E '^version' tests/version_pin.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "installing cedar-policy-cli ${version}"
          cargo install --locked --version "${version}" cedar-policy-cli || \
            cargo install --locked cedar-policy-cli
          cedar --version

      - name: live cedar CLI rc semantics
        run: |
          python3 -m unittest -v tests.test_cedar_cli_rc_semantics
