name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
        with:
          submodules: recursive
    - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
    - name: run unit + hygiene tests
        run: python3 -m unittest discover -v tests

  preflight:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - uses: actions/checkout@v4
        with:
          submodules: recursive
    - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
    - name: preflight.py
        run: python3 scripts/preflight.py
    - name: preflight --strict (warn-only gates surfaced)
        run: python3 scripts/preflight.py --strict || true

  # Image build + integration tests run on a self-hosted runner on
  # release tags (the monolith is ~12 GB and the GitHub free-tier 7 GB
  # RAM chokes on the Mathlib prewarm + cedar-spec SymCC proofs step).
  # For PRs, the unit-tests + preflight jobs above are the backstop.
