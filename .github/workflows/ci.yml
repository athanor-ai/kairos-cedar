name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: preflight.py
        run: python3 scripts/preflight.py
      - name: preflight --strict (warn-only gates surfaced)
        run: python3 scripts/preflight.py --strict || true

  # Image build is off the free-tier runner (monolith is ~12 GB; the 7 GB
  # RAM cap on GitHub's hosted Linux runner chokes on the Lean+Mathlib
  # prewarm step). We build + push from a self-hosted runner in a
  # separate workflow that runs on release tags only. For PRs, the
  # preflight job above is the backstop.
