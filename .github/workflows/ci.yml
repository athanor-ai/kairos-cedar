name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: preflight.py
        run: python3 scripts/preflight.py
      - name: preflight --strict (warn on disk + arch gating)
        run: python3 scripts/preflight.py --strict || true

  build-spec:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: build cedar-spec:dev
        run: docker build -f containers/spec.Containerfile -t cedar-spec:dev .
      - name: lake build cedar-spec-bridge
        run: |
          docker run --rm -v "$PWD":/work -w /work/cedar-spec-bridge cedar-spec:dev \
            bash -c 'lake update && lake build'
